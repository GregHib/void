[crumbling_tomb]
title = "Legend of the Brothers"
type = "long"
pages = [
    [
        "It is said that during the",
        "great God Wars there were",
        "six brothers who fought side",
        "by side against the forces of",
        "evil. Their fervor in battle",
        "was awed and feared by all",
        "who saw them. Nothing is",
        "known of their origins, only",
        "that they were first seen",
        "when the legions of evil were",
        "pressing their hardest into",
        "civilised lands.",
        "",
        "It was the eldest who struck",
        "the first blow in that battle,",
        "hurling powerful battle magic",
        "into the enemy ranks,",
        "opening a hole for four of",
        "the other brothers to charge",
        "through and into the heart of",
        "their forces.",
        "",
        "Little was seen or known of",
        "the sixth brother at the time,",
        "only that when one of the",
        "other brothers faced danger,",
        "his foe would be felled by a",
        "shower of crossbow bolts.",
        "",
        "It wasn't until the dust had",
    ],
    [
        "settled that those left could",
        "look on their saviours, the six",
        "brothers who stood proud",
        "with the bodies of the fallen",
        "at their feet.",
        "",
        "For years these brothers",
        "fought hard against the",
        "enemy, throwing themselves",
        "into battle with little regard",
        "for their own safety and",
        "relying only on each other",
        "for aid. Soldiers told stories",
        "around campfires of the feats",
        "they'd witnessed. The",
        "brothers became legend long",
        "before the end, but it soon",
        "became clear they were not",
        "alone...",
        "",
        "Some say he'd always been",
        "there, but no one really",
        "knows for sure. The first",
        "real tale of him was after an",
        "incursion deep into the dark",
        "lands, where once again the",
        "brothers proved their worth.",
        "",
        "It was after the battle that a",
        "bent and robed figure was",
    ],
    [
        "seen amongst the bodies of",
        "the dead. Most took him for",
        "a scavenger, but he moved",
        "towards the campfire of the",
        "brothers with such directness",
        "that some at first thought him",
        "another companion. The",
        "brothers however reacted with",
        "suspicion at his approach,",
        "drawing their weapons and",
        "rising from their places. The",
        "stranger merely stood before",
        "them, as though sizing them",
        "up, before turning and",
        "walking back into the mists.",
        "Some say that it was the first",
        "time they'd ever seen the",
        "brothers unsure.",
        "",
        "As the campaign moved",
        "deeper into the dark lands,",
        "the stranger appeared with",
        "greater frequency, often",
        "appearing on a rise near a",
        "battle and watching over it.",
        "The most disturbing thing",
        "was how his presence started",
        "to affect the brothers. They",
        "became distracted, and on",
        "occasion, even received",
    ],
    [
        "injuries that required",
        "attention.",
        "",
        "It was deep in the heart of",
        "the enemies' territory, in the",
        "failing light of dusk, that the",
        "enemy struck back. Great",
        "monstrosities swept through",
        "the camps, tearing at all in",
        "their path. Soldiers scattered",
        "like chaff in the wind before",
        "the onslaught.",
        "",
        "The brothers, valiant as ever,",
        "stood back-to-back before the",
        "enemy and fought with all",
        "their might. As dawn broke,",
        "the enemy fled the battle,",
        "moving faster than any man",
        "could give chase.",
        "",
        "It was as the soldiers went",
        "about rebuilding the camp",
        "that the brothers collapsed at",
        "their campfire. They lay as",
        "though dead, yet breathing,",
        "muttering in strange",
        "tongues. Their injuries were",
        "found swollen and infected.",
        "None of the physicians knew",
    ],
    [
        "what to do for it was like no",
        "infection they had ever seen",
        "before.",
        "",
        "All through the day the",
        "brothers were tended and",
        "cared for while the soldiers",
        "waited nervously for their",
        "heroes to rise once again. It",
        "was then, just as the sun's",
        "last rays vanished behind the",
        "horizon, that all hope was lost.",
        "As if on cue, all six brothers",
        "sighed their last breath. It",
        "was only then that the",
        "sentries noticed the stranger",
        "once again, standing on a",
        "rise just outside the camp.",
        "",
        "That night the camp was",
        "surrounded by the great",
        "beasts of the enemy once",
        "again, but they didn't attack.",
        "Instead, they merely baited",
        "the soldiers to come out and",
        "meet them. Once again, at",
        "the break of dawn, the",
        "enemy fled without a trace,",
        "leaving the soldiers tired from",
        "a restless night of worry and",
    ],
    [
        "fear.",
        "",
        "That day the commanders",
        "decided to turn back. They",
        "could advance no further",
        "without the brothers' aid. As",
        "was the custom at the time,",
        "out of honour and respect",
        "for the mighty fallen, they",
        "constructed six great barrows",
        "for the brothers. A crypt for",
        "each brother covered in a",
        "small hill of earth that would",
        "hold their remains",
        "undisturbed by predators.",
        "The work took many days,",
        "for each night the enemy",
        "returned. The soldiers had to",
        "flee back inside their camp",
        "and wait away the night to",
        "the sounds of howling and",
        "scratching at the fences.",
        "However, each day they",
        "resumed their work, with",
        "their sense of duty to the",
        "brothers surmounting their",
        "fear of the dark forces in the",
        "land.",
        "",
        "On the last day, the",
    ],
    [
        "assembled troops buried the",
        "brothers inside their stone",
        "tombs, then with great",
        "reverence, but little",
        "ceremony, they covered the",
        "tombs with earth. As the",
        "army broke camp and turned",
        "to march back to their lands,",
        "the stranger was seen once",
        "again, standing atop the",
        "central barrow... standing tall",
        "against the failing light with",
        "his arms outstretched to the",
        "sky.",
        "",
        "Not many of the original",
        "army made it back to these",
        "lands, for many more had",
        "perished on the journey",
        "home, but tales were told of",
        "how each night an unnatural",
        "glow could be seen on the",
        "horizon where they had",
        "buried the brothers. Even",
        "today there are stories told",
        "about those mounds of earth,",
        "and of the sights and sounds",
        "that have been witnessed",
        "nearby.",
    ]
]
