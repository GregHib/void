[teleport_clan_wars_games_necklace]
weight = 100
requires = [
    { equipment = { amulet = { id = "games_necklace_8" } } },
]
actions = [
    { interface = { option = "Clan Wars", id = "worn_equipment:amulet_slot:games_necklace_8" } },
    { wait = { ticks = 5 } },
]
produces = [
    { area = "clan_wars_teleport" },
]

[enter_clan_wars_ffa_safe]
weight = 100
requires = [
    { combat_level = { min = 30 } },
]
setup = [
    { variable = { id = "warning_clan_wars_ffa_safe", equals = 0, default = 0 } },
    { area = { id = "clan_wars_teleport" } },
]
actions = [
    { object = { option = "Enter", id = "clan_wars_portal_ffa_safe", success = { interface_open = { id = "warning_clan_wars_ffa_safe" } } } },
    { interface = { option = "Go in", id = "warning_clan_wars_ffa_safe:yes", success = { area = { id = "clan_wars_ffa_safe_arena" } } } },
]
produces = [
    { area = "clan_wars_ffa_safe_arena" },
]
