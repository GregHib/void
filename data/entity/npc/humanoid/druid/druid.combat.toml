death_anim = "druid_death"
death_sound = "man_death"

[druid_staff.melee]
range = 1
chance = 65
anim = "druid_staff_attack"
target_sound = "staff_stab"
target_hit = { offense = "crush", max = 40 }

[druid_staff.magic]
range = 1
chance = 35
target_hit = { offense = "magic", max = 50 }
anim = "bind_staff"
gfx = "bind_cast"
miss_sound = { id = "spell_splash", delay = 60 }
miss_gfx = { id = "spell_splash", delay = 60 }
impact_gfx = "entangle_impact"
impact_sound = "entangle_impact"

[druid_unarmed]
