[bear_drop_table]
type = "all"
drops = [
    { table = "bear_cub_primary" },
    { table = "bear_cub_tertiary" },
    { table = "bear_charms", members = true },
]

[bear_cub_primary]
type = "all"
drops = [
    { id = "bones" },
    { id = "bear_fur" },
    { id = "raw_bear_meat" },
]

[bear_cub_tertiary]
roll = 90
drops = [
    { id = "bear_ribs", chance = 90, variable = "rag_and_bone_man_wish_list", equals = "started", default = "unstarted" },
]

[bear_charms]
roll = 1000
drops = [
    { id = "gold_charm", chance = 150 },
    { id = "green_charm", chance = 5 },
    { id = "crimson_charm", chance = 10 },
    { id = "blue_charm", chance = 1 },
]