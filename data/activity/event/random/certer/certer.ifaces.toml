# Certer's identify interface (184). Its load script builds the three option rows (children 0-2)
# and the item model from varbits, so we set those and open it. The option rows are created
# dynamically with a "Select" action, declared here so clicks on them validate.
[certer_identify]
id = 184

[.option_1]
id = 0
options = { Select = 0 }

[.option_2]
id = 1
options = { Select = 0 }

[.option_3]
id = 2
options = { Select = 0 }
