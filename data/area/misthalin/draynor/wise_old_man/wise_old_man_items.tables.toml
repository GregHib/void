[wise_old_man_items]
row_id = "item"
intro = "string"
hint = "string"
quest = "string"
hard = "boolean"
skill_req = "pair<skill, int>"

[.anchovies]
skill_req = ["fishing", 15]
intro = "I could do with some freshly cooked anchovies for a salad I'm planning."
hint = "Use a small fishing net to get anchovies from the sea south of here. Then cook them on a fire or range."

[.beer_glass]
intro = "My glassware got damaged when I moved here, so I need some new beer glasses."
hint = "If you get some seaweed and a bucket of sand, you'll be able to mix them at a furnace to make molten glass. Then use a glassblowing pipe to make beer glasses. Most of what you need can be found on Entrana."

[.bones]
intro = "My plans for today require some sets of bones, the normal-sized sort you get from goblins."
hint = "You'll find bones easily enough if you fight creatures."

[.bronze_arrow]
intro = "I'm short of ammunition, so I could do with some bronze arrows. That way I can shoot at goblins through my window."
hint = "You can make them by chopping a log into arrowshafts and adding feathers to them, then smithing a bronze bar into arrowheads to complete the arrows."

[.bronze_bar]
intro = "I need some bronze bars."
hint = "Mine some copper ore and tin ore. The furnace in Lumbridge can smelt them into bars of bronze."

[.bronze_dagger]
intro = "I need a few bronze daggers to keep the goblins at bay."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make daggers."

[.bronze_hatchet]
intro = "The head fell off my hatchet when I was chopping wood last week, so I need some more bronze hachets."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make hatchets."

[.bronze_mace]
skill_req = ["smithing", 2]
intro = "I'd like some maces made of bronze."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make maces."

[.bronze_med_helm]
skill_req = ["smithing", 3]
intro = "I could do with some medium-sized helmets. I'd like bronze ones."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make helmets."

[.bronze_spear]
skill_req = ["smithing", 5]
intro = "I need some bronze spears."
hint = "If you kill some of those pesky goblins, you're bound to get some bronze spears."

[.bronze_sword]
skill_req = ["smithing", 5]
intro = "My weapons collection isn't all it used to be. Some short swords made of bronze would be much appreciated."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make short swords."

[.beer]
intro = "Strange as it may seem, I want a lot of beer!"
hint = "There's a pub not far from here that will sell you plenty of that. Go west to Port Sarim."

[.cadava_berries]
intro = "I've found a use for cadava berries."
hint = "Just look around the woods south-west of Varrock."

[.cooked_chicken]
intro = "I'm running short of food, so I'd like some cooked chickens."
hint = "You could try killing some chickens, then cooking their meat."

[.cooked_meat]
intro = "I'm a bit hungry. I'd like some cooked meat, not chicken or any sort of bird. And definitely not camel or rabbit either!"
hint = "Just cook some beef, rat or bear."

[.copper_ore]
intro = "I need a few lumps of copper ore."
hint = "It should be easy enough for you to mine some copper ore."

[.cowhide]
intro = "I'd like a few cowhides."
hint = "If you slaughter some cows, you'll get cowhides easily enough."

[.egg]
intro = "I'm going to make an omelette, so I'll need some eggs."
hint = "Eggs are usually found where chickens are farmed."

[.feather]
intro = "I need a handful of feathers to stick in my beard."
hint = "The cheapest way to get feathers is to kill chickens."

[.grain]
intro = "I'd like a bit of grain."
hint = "There's a field full of it north of here."

[.iron_bar]
skill_req = ["smithing", 15]
intro = "I need some iron bars."
hint = "Mine some iron ore. The furnace in Lumbridge can smelt them into bars of iron."

[.iron_mace]
skill_req = ["smithing", 17]
intro = "Some iron maces would be useful."
hint = "Try smelting some iron. Then hammer the bronze on an anvil to make maces."

[.iron_ore]
skill_req = ["mining", 17]
intro = "A few lumps of iron ore would be nice."
hint = "It should be easy enough for you to mine some iron ore."

[.soft_clay]
intro = "I'll need some clay that's been softened so I can craft it."
hint = "If you mine some clay, you can use containers of water on it to soften it."

[.leather_gloves]
intro = "It's a bit nippy in this house, and my hands are cold. I need some leather gloves."
hint = "If you get the tanner in Al Kharid to turn some cowhides into leather, you'll be able to sew the gloves yourself. Buy a needle & thread from the crafting shop in Al Kharid."

[.logs]
intro = "This house is a bit cold, so I could do with some normal logs to burn."
hint = "I suggest you take a hatchet and chop down some standard trees."

[.molten_glass]
intro = "Some chunks of molten glass would be the ideal patch for my cracked window."
hint = "Use a bucket of sand with some soda ash on a furnace."

[.raw_potato]
intro = "I need some potatoes, if you'd be so kind."
hint = "There's a field of those north of Lumbridge."

[.raw_rat_meat]
intro = "I hear pet cats are getting popular these days. I'd like some raw rat in case I get one."
hint = "You should find some big rats south-east of here in the swamp."

[.rune_essence]
quest = "rune_mysteries"
intro = "I'd like to study the rune essence that the wizards have been talking about recently, so I need a few pieces."
hint = "Ask the Archmage in the tower south of here to teleport you to the Rune Essence mine. Then you can mine me some pieces."

[.shrimps]
intro = "I could do with some freshly cooked shrimps for a salad I'm planning."
hint = "Use a small fishing net to get shrimps from the sea south of here. Then cook them on a fire or range."

[.silk]
intro = "My undergarments are getting a bit worn out. I'll be needing some sheets of silk to patch them."
hint = "There's a man in Al Kharid who sells it very cheaply. If you ever take any to Ardougne you'll get a good profit."

[.leather]
intro = "I'll be needing a few pieces of soft leather."
hint = "There's a tanner in Al Kharid who will turn cowhides into leather."

[.tin_ore]
intro = "I need a few lumps of tin ore."
hint = "You shouldn't have any trouble mining tin ore."

[.ball_of_wool]
hard = true
intro = "I saw an interesting bed in Karamja called a 'hammock'. It seemed to be made out of string, and I'd like some balls of wool so I can make my own."
hint = "You can buy shears from the general store east of here. Shear some sheep, then spin the wool into balls on the spinning wheel in Lumbridge Castle."

[.bowstring]
hard = true
intro = "My shortbow's string is getting a bit worn out, so could you fetch me some bow strings?"
hint = "If you pick some flax, you can use the spinning wheel in Lumbridge Castle to spin it into bowstrings."

[.bread]
hard = true
intro = "I don't have a decent larder here, so I can't store food very well. Now I'm out of loaves of bread."
hint = "Mix some flour and water to make bread dough, then bake it on a cooking range."

[.bronze_arrowtips]
hard = true
skill_req = ["smithing", 5]
intro = "I need a few bronze arrowheads to complete some arrows I was making."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make arrowtips."

[.bronze_knife]
hard = true
skill_req = ["smithing", 7]
intro = "I'd like some bronze knives to throw at goblins."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make knives."

[.bronze_warhammer]
hard = true
skill_req = ["smithing", 9]
intro = "Could you fetch me some big warhammers made of bronze?"
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make warhammers."

[.bronze_wire]
hard = true
skill_req = ["smithing", 4]
intro = "I need some lengths of bronze wire to repair something."
hint = "Try smelting some copper and tin ore to make bronze. Then hammer the bronze on an anvil to make wire."

[.headless_arrow]
hard = true
intro = "I want to make some arrows, so I'll need some headless arrows that have the feathers attached."
hint = "Use a knife to chop some logs into arrowshafts. Then add a feather to each arrowshaft."

[.swamp_paste]
hard = true
intro = "My roof is leaking, so I need some swamp paste to fix it."
hint = "Swamp tar is found south-east of here. Add it to a pot of flour and cook it on an open fire to make the paste."

[.iron_arrowtips]
hard = true
skill_req = ["smithing", 20]
intro = "I need some iron arrowheads to put on the arrows I was making."
hint = "Try smelting some iron. Then hammer the bronze on an anvil to make arrowtips."

[.iron_knife]
hard = true
skill_req = ["smithing", 20]
intro = "I could do with some iron throwing knives to keep the goblins away from my house."
hint = "Try smelting some iron. Then hammer the bronze on an anvil to make knives."

[.iron_warhammer]
hard = true
skill_req = ["smithing", 24]
intro = "I'd like some chunky iron warhammers."
hint = "Try smelting some iron. Then hammer the bronze on an anvil to make warhammers."

[.leather_cowl]
hard = true
skill_req = ["crafting", 9]
intro = "The hail can be very heavy here, so I'd like a few leather cowls."
hint = "If you get the tanner in Al Kharid to turn some cowhides into leather, you'll be able to make the cowls yourself. Buy needles & thread from the crafting shop in Al Kharid if you need any."

[.pot_of_flour]
hard = true
intro = "I'm out of flour, so I could do with a few pots of that."
hint = "There's a windmill north of here. You can use it to grind grain into flour. Then use an empty pot to collect the flour."

[.unfired_pie_dish]
hard = true
skill_req = ["crafting", 7]
intro = "Strange as this may seem, I need some unfired pie dishes."
hint = "Mine some clay. Then use a container full of water to soften it. In the Barbarian Village you'll be able to form this into pie dishes. Just don't bake them."

[.unfired_pot]
hard = true
intro = "Believe it or not, I need a few unfired clay pots."
hint = "Mine some clay. Then use a container full of water to soften it. In the Barbarian Village you'll be able to form this into pots. Just don't bake them."

[.leather_boots]
hard = true
skill_req = ["crafting", 7]
intro = "My footwear is getting a bit worn out, so I need a few pairs of leather boots."
hint = "If you get the tanner in Al Kharid to turn some cowhides into leather, you'll be able to make the boots yourself. Buy needles & thread from the crafting shop in Al Kharid if you need any."
