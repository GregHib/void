[pvp_basic_melee]
requires = [
    { skill = { id = "attack", min = 50 } },
    { skill = { id = "strength", min = 50 } },
    { skill = { id = "constitution", min = 50 } },
    { skill = { id = "defence", min = 40 } },
]
setup = [
    { equipment = { weapon = { id = "rune_scimitar,rune_longsword" }, chest = { id = "rune_platebody" }, legs = { id = "rune_platelegs" }, hat = { id = "rune_full_helm" } } },
    { inventory = [
        { id = "shark", min = 12 },
        { id = "super_strength_4", min = 1 },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { player = { option = "Attack", radius = 10, delay = 1, heal_percent = 20, success = { area = { id = "$area", present = false } } } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
produces = [
    { skill = "attack" },
    { skill = "strength" },
]

[pvp_intermediate_melee]
requires = [
    { skill = { id = "attack", min = 60 } },
    { skill = { id = "strength", min = 60 } },
    { skill = { id = "constitution", min = 60 } },
    { skill = { id = "defence", min = 50 } },
    { skill = { id = "prayer", min = 43 } },
]
setup = [
    { equipment = { weapon = { id = "rune_scimitar,rune_longsword" }, chest = { id = "rune_platebody" }, legs = { id = "rune_platelegs" }, hat = { id = "rune_full_helm" } } },
    { inventory = [
        { id = "shark", min = 14 },
        { id = "super_restore_4", min = 2 },
        { id = "super_strength_4", min = 1 },
        { id = "rune_crossbow", min = 1, equippable = true },
        { id = "adamant_bolts", min = 100 },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { switch_setup = { equipment = { weapon = { id = "rune_crossbow" }, ammo = { id = "adamant_bolts" } }, if = { target_armor_type = { equals = "metal" } } } },
    { retreat = { safe_area = "$safe_area", regroup_hp_percent = 70, if = { outmatched = { attackers_min = 2, own_hp_percent_max = 0.30 } } } },
    { player = { option = "Attack", radius = 10, delay = 1, heal_percent = 30, success = { area = { id = "$area", present = false } } } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
reactive = [
    { pray = { id = "protect_from_melee", if = { attacker_style = { equals = "melee" } } } },
    { pray = { id = "protect_from_missiles", if = { attacker_style = { equals = "ranged" } } } },
    { pray = { id = "protect_from_magic", if = { attacker_style = { equals = "magic" } } } },
]
produces = [
    { skill = "attack" },
    { skill = "strength" },
]

[pvp_advanced_tank]
requires = [
    { role = { equals = "tank" } },
    { skill = { id = "attack", min = 60 } },
    { skill = { id = "strength", min = 60 } },
    { skill = { id = "defence", min = 70 } },
    { skill = { id = "constitution", min = 75 } },
    { skill = { id = "prayer", min = 43 } },
]
setup = [
    { equipment = { weapon = { id = "rune_scimitar,rune_longsword" }, chest = { id = "rune_platebody" }, legs = { id = "rune_platelegs" }, hat = { id = "rune_full_helm" } } },
    { inventory = [
        { id = "shark", min = 16 },
        { id = "super_restore_4", min = 2 },
        { id = "super_strength_4", min = 1 },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { reposition = { radius = 1, if = { allies_on_tile = { min = 1 } } } },
    { retreat = { safe_area = "$safe_area", regroup_hp_percent = 80, if = { outmatched = { attackers_min = 3 } } } },
    { player = {
        option = "Attack", radius = 10, delay = 1, heal_percent = 40,
        target_score = [
            { input = "attacker_of_ally", curve = { type = "linear" }, weight = 4 },
            { input = "target_hp_percent", curve = { type = "logistic", midpoint = 0.4, steepness = 8 }, weight = 2 },
            { input = "distance", curve = { type = "exponential", base = 0.9 }, weight = 1 },
        ],
        success = { area = { id = "$area", present = false } },
    } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
reactive = [
    { pray = { id = "protect_from_melee", if = { attacker_style = { equals = "melee" } } } },
    { pray = { id = "protect_from_missiles", if = { attacker_style = { equals = "ranged" } } } },
    { pray = { id = "protect_from_magic", if = { attacker_style = { equals = "magic" } } } },
]
produces = [
    { skill = "defence" },
    { skill = "constitution" },
]

[pvp_advanced_pure]
requires = [
    { role = { equals = "pure" } },
    { skill = { id = "attack", min = 60 } },
    { skill = { id = "strength", min = 85 } },
    { skill = { id = "defence", max = 1 } },
]
setup = [
    { equipment = { weapon = { id = "rune_scimitar,rune_longsword" } } },
    { inventory = [
        { id = "shark", min = 16 },
        { id = "super_restore_4", min = 2 },
        { id = "super_strength_4", min = 2 },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { reposition = { radius = 1, if = { allies_on_tile = { min = 1 } } } },
    { retreat = { safe_area = "$safe_area", regroup_hp_percent = 60, if = { outmatched = { attackers_min = 2, own_hp_percent_max = 0.25 } } } },
    { player = {
        option = "Attack", radius = 12, delay = 1, heal_percent = 50,
        target_score = [
            { input = "target_hp_percent", curve = { type = "logistic", midpoint = 0.35, steepness = 10 }, weight = 4 },
            { input = "combat_level_delta", curve = { type = "linear", min = -20, max = 20 }, weight = 1 },
        ],
        success = { area = { id = "$area", present = false } },
    } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
reactive = [
    { pray = { id = "piety", if = { skill = { id = "prayer", min = 70 } } } },
]
produces = [
    { skill = "strength" },
]
