# Each template ends with { restart = { success = { area = { id = "$area", present = false } } } }.
# The restart loop is bounded by three signals: area exit (success condition above), death
# (BotRetreat returns Failed(Cancelled) when bot.player.dead), and activity timeout (reset by
# the `produces` skill events listed per-template, so idle bots eventually fail).

[pvp_zerker]
requires = [
    { skill = { id = "attack", min = 60 } },
    { skill = { id = "strength", min = 80 } },
    { skill = { id = "defence", min = 45, max = 45 } },
    { skill = { id = "constitution", min = 75 } },
    { skill = { id = "prayer", min = 95 } },
]
setup = [
    { equipment = { weapon = { id = "abyssal_whip" }, chest = { id = "fighter_torso" }, legs = { id = "rune_platelegs" }, hat = { id = "helm_of_neitiznot" }, feet = { id = "dragon_boots" }, amulet = { id = "amulet_of_fury" }, ring = { id = "berserker_ring" }, cape = { id = "obsidian_cape" } } },
    { inventory = [
        { id = "shark", min = 16 },
        { id = "super_restore_4", min = 2 },
        { id = "super_attack_4", min = 1 },
        { id = "super_strength_4", min = 1 },
        { id = "super_defence_4", min = 1 },
        { id = "dragon_dagger_p++", min = 1, equippable = true },
        { id = "granite_maul", min = 1, equippable = true },
        { id = "games_necklace_6", min = 1, equippable = true },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { player = { option = "Attack", radius = 10, delay = 1, heal_percent = 40, loot_strategy = "survival", area = "$area", success = { area = { id = "$area", present = false } } } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
reactive = [
    { pray = { id = "deflect_melee", if = { attacker_style = { equals = "melee" } } } },
    { pray = { id = "deflect_missiles", if = { attacker_style = { equals = "ranged" } } } },
    { pray = { id = "deflect_magic", if = { attacker_style = { equals = "magic" } } } },
    { pray = { id = "berserker", if = { area = { id = "$area" } } } },
    { pray = { id = "turmoil", if = { area = { id = "$area" } } } },
    { spec_attack = { weapon = "dragon_dagger_p++", fallback = "abyssal_whip", min_energy = 250, if = { target_hp_percent = { max = 0.25 } } } },
    { drink_potion = { item = "super_attack_*", skill = "attack" } },
    { drink_potion = { item = "super_strength_*", skill = "strength" } },
    { drink_potion = { item = "super_defence_*", skill = "defence" } },
    { drink_potion = { item = "super_restore_*", skill = "prayer" } },
]
produces = [
    { skill = "attack" },
    { skill = "strength" },
    { skill = "defence" },
    { skill = "constitution" },
    { skill = "prayer" },
]

