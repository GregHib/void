    { skill = { id = "attack", min = 70 } },
    { skill = { id = "strength", min = 70 } },
    { skill = { id = "defence", min = 70 } },
    { skill = { id = "constitution", min = 70 } },
    { skill = { id = "prayer", min = 95 } },
]
setup = [
    { equipment = { weapon = { id = "dharoks_greataxe" }, chest = { id = "dharoks_platebody" }, legs = { id = "dharoks_platelegs" }, hat = { id = "dharoks_helm" }, feet = { id = "dragon_boots" }, cape = { id = "obsidian_cape" } } },
    { inventory = [
        { id = "shark", min = 16 },
        { id = "super_restore_4", min = 2 },
        { id = "super_attack_4", min = 1 },
        { id = "super_strength_4", min = 1 },
        { id = "super_defence_4", min = 1 },
        { id = "dwarven_rock_cake", min = 1 },
        { id = "games_necklace_6", min = 1, equippable = true },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { player = { option = "Attack", radius = 10, delay = 1, heal_percent = 25, loot_strategy = "survival", area = "$area", success = { area = { id = "$area", present = false } } } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
reactive = [
    { pray = { id = "berserker", if = { area = { id = "$area" } } } },
    { pray = { id = "soul_split", if = { area = { id = "$area" } } } },
    { pray = { id = "turmoil", if = { area = { id = "$area" } } } },
    # Boost potions only at fight start; dharoker has no spec.
    { drink_potion = { item = "super_attack_*", skill = "attack", if = { clock = { id = "fight_starting" } } } },
    { drink_potion = { item = "super_strength_*", skill = "strength", if = { clock = { id = "fight_starting" } } } },
    { drink_potion = { item = "super_defence_*", skill = "defence", if = { clock = { id = "fight_starting" } } } },
    { drink_potion = { item = "super_restore_*", skill = "prayer" } },
    { drink_potion = { item = "super_restore_*", skill = "strength", if = { skill_percent = { id = "strength", max_percent = 30 } } } },
]
produces = [
    { skill = "attack" },
    { skill = "strength" },
    { skill = "defence" },
    { skill = "constitution" },
    { skill = "prayer" },
]

[pvp_ags_main]
requires = [
    { skill = { id = "attack", min = 75 } },
    { skill = { id = "strength", min = 85 } },
    { skill = { id = "defence", min = 75 } },
    { skill = { id = "constitution", min = 85 } },
    { skill = { id = "prayer", min = 95 } },
]
setup = [
    { equipment = { weapon = { id = "armadyl_godsword" }, chest = { id = "torva_platebody,bandos_chestplate" }, legs = { id = "torva_platelegs,bandos_tassets" }, hat = { id = "torva_full_helm,helm_of_neitiznot" }, feet = { id = "bandos_boots" }, amulet = { id = "amulet_of_fury" }, ring = { id = "berserker_ring" }, cape = { id = "obsidian_cape" } } },
    { inventory = [
        { id = "shark", min = 16 },
        { id = "super_restore_4", min = 2 },
        { id = "saradomin_brew_4", min = 2 },
        { id = "overload_4", min = 1 },
        { id = "abyssal_whip", min = 1, equippable = true },
        { id = "games_necklace_6", min = 1, equippable = true },
    ] },
    { area = { id = "$area" } },
]
actions = [
    { interface = { option = "Select", id = "combat_styles:$style" } },
    { player = { option = "Attack", radius = 10, delay = 1, heal_percent = 40, loot_strategy = "survival", area = "$area", success = { area = { id = "$area", present = false } } } },
    { restart = { success = { area = { id = "$area", present = false } } } },
]
reactive = [
    { pray = { id = "deflect_melee", if = { attacker_style = { equals = "melee" } } } },
    { pray = { id = "deflect_missiles", if = { attacker_style = { equals = "ranged" } } } },
    { pray = { id = "deflect_magic", if = { attacker_style = { equals = "magic" } } } },
    { pray = { id = "berserker", if = { area = { id = "$area" } } } },
    { pray = { id = "turmoil", if = { area = { id = "$area" } } } },
    { spec_attack = { weapon = "armadyl_godsword", fallback = "armadyl_godsword", min_energy = 500, if = { target_hp_percent = { max = 0.25 } } } },
    # Overload at fight start or pre-spec; covers atk/str/def in one drink.
    { drink_potion = { item = "overload_*", skill = "strength", if = { any = [{ clock = { id = "fight_starting" } }, { target_hp_percent = { max = 0.25 } }] } } },
    { drink_potion = { item = "super_restore_*", skill = "prayer" } },
    # Brew→food chain: food eaten this/last tick → drink brew next, stacking the overheal.
    { drink_potion = { item = "saradomin_brew_*", skill = "constitution", if = { clock = { id = "just_ate_food" } } } },
    # Restore once 3 brews have stacked enough debuff OR the primary combat stat dips below 30% max.
    { drink_potion = { item = "super_restore_*", skill = "strength", if = { any = [{ variable = { id = "brew_doses_since_restore", default = 0, min = 3 } }, { skill_percent = { id = "strength", max_percent = 30 } }] } } },
]
produces = [
    { skill = "attack" },
    { skill = "strength" },
    { skill = "defence" },
    { skill = "constitution" },
    { skill = "prayer" },
]

