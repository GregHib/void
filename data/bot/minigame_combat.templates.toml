# =============================================================================
# Minigame Combat templates — how this file works
# =============================================================================
#
# Each [section] below is a TEMPLATE. Templates are blueprints, not running
# activities. They get instantiated by entries in *.bots.toml (e.g.
# data/minigame/clan_wars/clan_wars.bots.toml) which set:
#
#     [clan_wars_ffa_safe_zerker]
#     template = "pvp_zerker"      # name of a template below
#     capacity = 3                 # max concurrent bots in this activity
#     timeout  = 500               # ticks of no progress before fail
#     fields   = { style = "style2", area = "clan_wars_ffa_safe_arena", ... }
#
# Every "$name" string in a template is replaced with fields[name] at load
# time (see Fragment.resolve in game/.../bot/behaviour/Behaviour.kt). One
# template can drive many arenas just by varying `fields`.
#
# Top-level keys allowed in a template:
#   requires  array  Bot-level prerequisites (skill levels, owned items).
#                    Filtered against `bot.player` when the activity is picked
#                    by BotManager.assignRandom; failing it makes the activity
#                    invisible to that bot.
#   setup     array  Per-engagement state the bot must be in BEFORE `actions`
#                    can start. A failing setup row triggers a resolver
#                    sub-frame (e.g. "be in $area" → BotGoTo). Resolvers live
#                    in *.setups.toml and clan_wars.setups.toml.
#   actions   array  Sequential body of the activity, advanced once per tick
#                    by BotManager.execute. The last entry is conventionally
#                    `restart` so the activity loops until `success` fires.
#   reactive  array  Runs every tick alongside `actions` via
#                    BotManager.runReactive — REACTIVES RUN BEFORE THE MAIN
#                    ACTION each tick, and entries iterate top-to-bottom.
#                    Used for short-lived decisions (prayer toggles, drinks,
#                    spec attacks). Each reactive's `if` gates execution.
#   produces  array  Tags ({ skill = "..." } etc.) the activity emits, used
#                    by BotManager.updateAvailable to recompute eligibility
#                    after the bot's state changes.
#   loadouts                map  Hybrid templates only — named gear/inventory
#   hybrid_starting_loadout str  variants (see pvp_dangerous_hybrid).
#   hybrid_swap_cooldown    int  Default 3 ticks between loadout swaps.
#   hybrid_swap_per_tick    int  Default 1 equipment slot changed per tick.
#
# Lifecycle of one tick (BotManager.tick):
#   1. If no active frame, assignRandom() picks an activity (honouring
#      bot.pinned for PvP bots).
#   2. runReactive() — every entry in `reactive` fires once. Reactives queue
#      instructions but don't change the main frame's state.
#   3. execute() — advances the main frame:
#        Pending → check `setup`; failures spawn a resolver sub-frame.
#        Running → call current action's update().
#        Wait    → countdown, then transition to the inner state.
#        Success → step to the next action in `actions`.
#        Failed  → handle per Reason; pinned bots stay pinned.
#
# The pvp_zerker template below is fully annotated as a worked example. The
# rest of this file relies on the same vocabulary; refer back here when in
# doubt. Catalog of every condition / action type is in:
#   game/src/main/kotlin/content/bot/behaviour/condition/Condition.kt   (parse)
#   game/src/main/kotlin/content/bot/behaviour/action/ActionParser.kt   (parsers map)
#
# =============================================================================

# -----------------------------------------------------------------------------
# pvp_zerker — annotated worked example
# -----------------------------------------------------------------------------
[pvp_zerker]

# `requires` rows are checked against bot.player when picking an activity.
# These are absolute base levels (BotSkillLevel uses levels.getMax, the
# XP-driven level — not the current decayed/boosted value). A drained skill
# therefore won't deactivate the activity mid-fight.
#   { skill = { id, min, max } }      → absolute level bounds
#   { skill_percent = { id, max_percent = 30 } }  → current vs max as percent
#   { combat_level = { min, max } } / { equipment = ... } / { inventory = ... }
#   etc. Full list: Condition.kt parse switch.
requires = [
    { skill = { id = "attack",       min = 60 } },
    { skill = { id = "strength",     min = 80 } },
    { skill = { id = "defence",      min = 45, max = 45 } },  # zerker: defence pinned to 45
    { skill = { id = "constitution", min = 75 } },
    { skill = { id = "prayer",       min = 95 } },
]

# `setup` rows are the engagement preconditions. Each row that doesn't pass
# triggers the matching resolver to run as a sub-frame. The activity blocks
# at Pending until every setup row checks true (or a resolver fails — which
# fails the activity).
#
# `equipment` and `inventory` rows here also drive applyTier in BotCommands.kt
# at spawn time: the bot is given exactly this kit when its tier is applied.
#
# Items support `min`, `max`, `equippable`, `usable`. Use `equippable = true`
# for items the bot will swap to mid-fight (granite_maul, dragon_dagger_p++)
# so the requirement pre-checks the bot can actually wear them.
setup = [
    { equipment = {
        weapon = { id = "abyssal_whip" },
        chest  = { id = "fighter_torso" },
        legs   = { id = "rune_platelegs" },
        hat    = { id = "helm_of_neitiznot" },
        feet   = { id = "dragon_boots" },
        amulet = { id = "amulet_of_fury" },
        ring   = { id = "berserker_ring" },
        cape   = { id = "obsidian_cape" },
    } },
    { inventory = [
        { id = "shark",            min = 16 },                     # food: BotFightPlayer.eat() picks the first "Eat" option it finds
        { id = "super_restore_4",  min = 2 },                      # prayer + safety-net restore
        { id = "super_attack_4",   min = 1 },                      # boost — drunk by reactive below
        { id = "super_strength_4", min = 1 },
        { id = "super_defence_4",  min = 1 },
        { id = "dragon_dagger_p++", min = 1, equippable = true },  # spec weapon (BotSpecAttack swaps to it)
        { id = "granite_maul",      min = 1, equippable = true },  # alt spec weapon if the activity wants one
        { id = "games_necklace_6",  min = 1, equippable = true },  # retreat teleport (used by jewellery_teleport reactives in *.bots.toml)
    ] },
    # `area` is the BotInArea condition. The matching resolver
    # (enter_clan_wars_ffa_safe / _dangerous in clan_wars.setups.toml) walks
    # the bot from the staging area through the portal into `$area`.
    { area = { id = "$area" } },
]

# `actions` is the sequential body. Per tick BotManager.execute advances
# whichever action is current; on Success the next one starts.
actions = [
    # One-shot per restart: clicks the combat-style tab so subsequent attacks
    # use the right style (`$style` is e.g. style2 = aggressive). The
    # `interface` action targets "interface:component[:item]" ids.
    { interface = { option = "Select", id = "combat_styles:$style" } },

    # The long-running engagement loop — BotFightPlayer. Picks a target via
    # spiral search within `radius`, attacks, eats when HP <= heal_percent
    # of max, loots own kills (loot_strategy = survival prefers consumables).
    # `success` here is what flips this action to Success early — the
    # bot leaving `$area` (retreat or teleport-out) ends the fight cleanly
    # so the next action (`restart`) can decide whether to loop.
    { player = {
        option        = "Attack",
        radius        = 10,
        delay         = 1,
        heal_percent  = 40,
        loot_strategy = "survival",
        area          = "$area",
        success       = { area = { id = "$area", present = false } },
    } },

    # `restart` loops the body. Without this, the activity runs once and ends.
    # Its own `success` is what ENDS the activity (vs continuing); same area-
    # exit condition as `player.success` above means: while the bot is in
    # the arena, restart the engagement; once it leaves, exit cleanly.
    { restart = { success = { area = { id = "$area", present = false } } } },
]

# Reactives fire every tick in the order written. Earlier entries get to
# fire first — and once a reactive uses an interface that sets `drink_delay`
# (any potion drink) or otherwise blocks subsequent reactives, later entries
# no-op for that tick.
reactive = [
    # Overhead prayer: matches the most recent attacker's style. attacker_style
    # reads the same source as the `Player.attackerStyle` debug. These three
    # rows are mutually exclusive — only one matches per tick.
    { pray = { id = "deflect_melee",    if = { attacker_style = { equals = "melee"  } } } },
    { pray = { id = "deflect_missiles", if = { attacker_style = { equals = "ranged" } } } },
    { pray = { id = "deflect_magic",    if = { attacker_style = { equals = "magic"  } } } },

    # Damage-boosting curse — kept on while inside the arena, off elsewhere
    # (so it doesn't drain prayer in the lobby). $area is replaced per arena.
    { pray = { id = "berserker", if = { area = { id = "$area" } } } },
    { pray = { id = "turmoil",   if = { area = { id = "$area" } } } },

    # Spec attack: equips `weapon` (uses `fallback` between specs), checks
    # min_energy + the `if` condition, then flips player.specialAttack = true
    # so the next combat swing consumes spec energy. target_hp_percent.max=0.25
    # = "target HP at 25% or below" → finisher window.
    { spec_attack = { weapon = "dragon_dagger_p++", fallback = "abyssal_whip", min_energy = 250, if = { target_hp_percent = { max = 0.25 } } } },

    # ---- Boost-potion gating rule (PvP-wide) -------------------------------
    # Boosts are drunk ONLY at the start of a fight or right before a spec —
    # never on plain decay during regular combat.
    #
    # `fight_starting` is a 5-tick clock set by BotFightPlayer.search() (and
    # equivalents in BotCastSpell/BotFightNpc) every time a NEW InteractPlayer
    # is queued. Five ticks gives `drink_delay` (~2 ticks per drink) room to
    # sequence two-three drinks before the clock expires.
    #
    # super_strength is the spec-scaling stat for the dagger spec, so it
    # ALSO fires inside the spec window via `any[fight_starting, target_hp...]`.
    # super_attack/super_defence don't scale the spec, so they fight-start only.
    { drink_potion = { item = "super_attack_*",   skill = "attack",   if = { clock = { id = "fight_starting" } } } },
    { drink_potion = { item = "super_strength_*", skill = "strength", if = { any = [{ clock = { id = "fight_starting" } }, { target_hp_percent = { max = 0.25 } }] } } },
    { drink_potion = { item = "super_defence_*",  skill = "defence",  if = { clock = { id = "fight_starting" } } } },

    # Prayer restore: unconditional — BotDrinkPotion treats Skill.Prayer
    # specially (drinks while current >= max), so any drained point fires it.
    { drink_potion = { item = "super_restore_*", skill = "prayer" } },

    # Safety-net restore: if a primary combat stat is dragged below 30% of
    # max (e.g. after curse leeches or stacked saradomin brews on a brew
    # template), drink super_restore even though prayer is already full.
    # `skill_percent` reads current vs base/max as a percentage —
    # see BotSkillPercent. Templates that carry brews additionally OR-in
    # `variable brew_doses_since_restore.min=3` here; pvp_zerker has no brews.
    { drink_potion = { item = "super_restore_*", skill = "strength", if = { skill_percent = { id = "strength", max_percent = 30 } } } },
]

# `produces` = events the activity emits when the bot's state changes. These
# names ("skill:attack" etc.) are matched against the keys/events sets each
# Condition declares; activities listed in `groups[event]` get re-evaluated
# in BotManager.updateAvailable. Tag every skill the bot trains/drinks here
# so the manager doesn't blacklist the activity after a successful fight.
produces = [
    { skill = "attack" },
    { skill = "strength" },
    { skill = "defence" },
    { skill = "constitution" },
    { skill = "prayer" },
]
# -----------------------------------------------------------------------------
# End of pvp_zerker worked example. The templates below use the same
# vocabulary — refer to the comments above when reading them.
# -----------------------------------------------------------------------------

[pvp_dharoker]
