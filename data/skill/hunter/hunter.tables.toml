requires = ["knife"]
items = ["logs"]
item_message = "You need some logs and a knife to set a pitfall trap."
collapse_ticks = 300
collapse_message = "The pitfall trap that you constructed has collapsed."

# ---------------------------------------------------------------------------
# Creatures — keyed by the *caught* object id (the triggered/full-trap object)
# ---------------------------------------------------------------------------
[creatures]
trap = "string"        # which trap type is used
caught_obj = "obj"     # object id when creature is caught inside
level = "int"          # minimum hunter level to lure
xp = "int"             # xp * 0.1  (stored as tenths for int precision)
catch_anim = "anim"    # animation played by creature as it enters trap
fail_anim = "anim"     # animation played by creature on escape (optional)
loot = "list<item>"    # items awarded on catch
chance = "range"

