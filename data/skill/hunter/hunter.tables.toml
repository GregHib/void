[traps]
trap = "obj"       # the active (set) object
fail = "obj"       # the failed/collapsed object (optional)
setup_anim = "anim"
take_down_anim = "anim"
level = "int"
level_default = 1
items = "list<item>"

[.snare]
trap = "snare_trap"
fail = "snare_trap_fail"
setup_anim = "lay_trap"
take_down_anim = "take_trap"
items = ["bird_snare"]

[.box_trap]
level = 27
trap = "box_trap"
fail = "box_trap_fail"
setup_anim = "lay_trap"
take_down_anim = "lay_trap"
items = ["box_trap"]

[.boulder_trap]
level = 23
trap = "boulder_trap_setup"
fail = "boulder_trap_fail"
setup_anim = "lay_trap"
take_down_anim = "lay_trap"
items = ["logs"]

[.swamp_net]
level = 29
trap = "swamp_net_setup"
fail = "swamp_net_fail"
setup_anim = "climb_down"
take_down_anim = "climb_down"
items = ["rope", "small_fishing_net"]

[.orange_net]
level = 47
trap = "orange_net_setup"
setup_anim = "climb_down"
take_down_anim = "climb_down"
items = ["rope", "small_fishing_net"]

[.red_net]
level = 59
