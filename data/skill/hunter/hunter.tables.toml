[trap_npcs]
row = "npc"
trap = "string"

[.hunting_ojibway_trap_npc]
trap = "bird_snare"

[.hunting_ojibway_trap_npc_off]
trap = "bird_snare"

[.hunting_sapling_trap_npc]
trap = "swamp_net"

[.hunting_sapling_trap_npc_off]
trap = "swamp_net"

[traps]
trap = "obj"       # the active (set) object
fail = "obj"       # the failed/collapsed object (optional)
setup_anim = "anim"
setup_sound = "string"
take_down_anim = "anim"
level = "int"
level_default = 1
requires = "list<item>"
items = "list<item>"
max = "int"
max_default = 5
step_away = "boolean"
step_away_default = true
item_message = "string"
collapse_ticks = "int"
collapse_message = "string"
npc = "npc"
bait = "item"

[.bird_snare]
trap = "bird_snare"
fail = "bird_snare_fail"
setup_anim = "lay_trap"
setup_sound = "set_noose"
take_down_anim = "take_trap"
items = ["bird_snare"]
collapse_ticks = 100
collapse_message = "The bird snare that you laid has fallen over."
npc = "hunting_ojibway_trap_npc"

[.rabbit_snare]
trap = "rabbit_snare"
fail = "rabbit_snare_fail"
setup_anim = "lay_trap_small"
take_down_anim = "lay_trap_small"
items = ["rabbit_snare"]
collapse_ticks = 104
collapse_message = "The snare that you placed has fallen over."
npc = "hunting_snare_trap_npc"

[.box_trap]
level = 27
trap = "box_trap"
