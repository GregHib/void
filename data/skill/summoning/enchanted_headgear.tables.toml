# Helms that can be enchanted to hold combat Summoning scrolls: the plain, tradeable base form
# (row id), the empty enchanted form Pikkupstix converts it into, the charged form it takes while
# holding scrolls, the Summoning level to enchant it and the scroll capacity. For the hunter helms
# (antlers/lizard skull/feather headdresses) the plain form is already the enchanted one - so
# enchanted == the row id and there's no separate Pikkupstix step, matching darkan.

[enchanted_headgear]
row_id = "item"
enchanted = "item"
charged = "item"
level = "int"
capacity = "int"

# Hunter helms - plain form is already scroll-capable.
[.antlers]
enchanted = "antlers"
charged = "antlers_charged"
level = 10
capacity = 40

[.lizard_skull]
enchanted = "lizard_skull"
charged = "lizard_skull_charged"
level = 30
capacity = 65

