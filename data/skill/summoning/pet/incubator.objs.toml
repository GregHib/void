# Pet incubator scenery.
# Each site has a distinct base (incubator_taverley / incubator_yanille) so
# `target.id.removePrefix("incubator_")` resolves the region suffix. The
# `incubator_idle` / `incubator_active` transforms below are the varbit-driven
# rendered meshes shared by both sites; they need string ids registered so the
# operate dispatch (which keys on the displayed def) lands on the same handler
# set as the base.

[incubator_taverley]
id = 28550

[incubator_yanille]
id = 28352

[incubator_idle]
id = 28336

[incubator_active]
id = 28359
