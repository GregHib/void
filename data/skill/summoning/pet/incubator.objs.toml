# Pet incubator scenery.
# Cache transforms (verified): 28550 and 28352 are base objects with varbit-driven
# transforms; the player never sees them directly. The displayed object is:
#   varbit = 0  ->  28336  (idle, no egg)
#   varbit >= 1 ->  28359  (active: incubating or finished hatching)
# Right-click options (Take-egg, Inspect, Examine) live on 28359 only.

[incubator_idle]
id = 28336

[incubator_active]
id = 28359

[incubator_empty]
id = 28550

[incubator_incubating]
id = 28352
