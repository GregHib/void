# Persistent incubator state, per region.
#
# `incubator_end_*` is a tick-based clock (engine `start` / `remaining` helpers).

[incubator_egg_taverley]
format = "string"
persist = true
transmit = false

[incubator_end_taverley]
format = "int"
persist = true
transmit = false

[incubator_finished_announced_taverley]
format = "bool"
persist = true
transmit = false

