# Talk-to dialogue rows for pets. One row per conversation; selected at random.
# Each `lines` entry is prefixed with a single speaker code:
#   npc:      - pet chathead dialogue
#   player:   - player chathead dialogue
#   overhead: - overhead bubble above the pet
#   [...]     - narrator thought-bubble, brackets stripped
#   (none)    - narrator chatbox statement
#
# Dog rows may include inline (translation) parens; the dog walker shows
# only the bark text below Summoning level 14, and both bark+translation
# at level 14+. Non-dog rows render parens verbatim.
#
# `pet` matches RowDefinition.rowId for generic pets, or the breed name
# (`bulldog`, `dalmatian`, etc.) for dogs. `stage` filters by life stage
# ("baby"/"grown"/"overgrown"); blank matches any stage. `condition` is
# an optional inventory item id; conditional rows win over the random pool.

[pet_talks]
pet = "string"
stage = "string"
condition = "string"
lines = "list<string>"

