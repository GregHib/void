# Breed-specific Talk-to dialogue for pet dogs. One row per conversation.
# Each `lines` entry is prefixed with a single-character speaker code:
#   b:  - overhead bark (NPC.say) used for puppy lines (raw barks, no translation)
#   d:  - dog chathead (npc<Happy>(...)) used for adult lines where the wiki
#         renders "bark (translation)" together
#   p:  - player chathead (player<Happy>(...))
#   (no prefix) - narrator chatbox (statement(...))
#
# `condition` is an optional item string-id; the row only plays if the player
# is currently carrying that item. Blank = unconditional.

[dog_talks]
breed = "string"
stage = "string"
condition = "string"
lines = "list<string>"

# --- Labrador ---
[.labrador_baby_1]
breed = "labrador"
stage = "baby"
condition = ""
lines = [
  "b:Yipyip yip yap yipyap, yap!",
  "p:I'm sure I can find us something to do.",
  "b:Yapyapyap? Yapyap!",
  "p:Sure. We can play when I'm finished here, okay?",
]

[.labrador_grown_1]
breed = "labrador"
stage = "grown"
condition = ""
lines = [
  "d:Can we play now?",
  "p:Give me a minute, I have to finish something before we can.",
  "d:What about afterwards?",
  "p:Well we'll have to see, won't we?",
  "d:Fair enough, eh!",
]

[.labrador_grown_2]
breed = "labrador"
stage = "grown"
condition = ""
lines = [
  "d:It wouldn't kill you to throw a stick around, eh?",
  "p:That's true, and I will but right now I'm busy, okay?",
  "d:Okay, I know you have biped stuff to get on with, eh.",
]

[.labrador_grown_3]
breed = "labrador"
stage = "grown"
condition = ""
lines = [
  "d:I want to get something to eat!",
  "p:You always want something to eat!",
  "d:I'm a growing dog!",
  "p:You'll have to lay off the food or the only way you will grow is outwards.",
]

