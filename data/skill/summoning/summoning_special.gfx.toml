# Familiar special-move graphics + projectiles (cast-button specials).
# Suffix conventions: bare name = the familiar's own gfx, _proj = projectile, _hit = target gfx.
#
# Projectile speed standard (units are client ticks, 30 per 0.6s game tick): delay = 30,
# time_offset = 10, multiplier = 10 gives a flight of 1 game tick + 1/3 of a tick per tile -
# the live game's "1 + floor(distance / 3)" hit delay. Deliberate exceptions (e.g. Bull Rush's
# constant 2s charge) note why inline.

