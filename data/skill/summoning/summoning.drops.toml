# Forage tables for forager familiars. Rolled once into the familiar's inventory every ~30s
# while summoned; the player withdraws the loot from the familiar.
#
# Each `forage_<familiar>` table is rolled per tick: a 1/<roll> chance to produce a drop. For
# multi-item foragers the hit defers to a `_items` sub-table that picks one item uniformly
# (matching the reference's "1/outOf chance, then drop one"). A familiar is treated as a forager
# purely by the existence of its `forage_<id>` table - no npc-def param is needed.

# --- Magpie: gems and rings (1/9) ---
[forage_magpie]
roll = 9
drops = [{ table = "forage_magpie_items", chance = 1 }]

[forage_magpie_items]
roll = 12
drops = [
    { id = "uncut_diamond" },
    { id = "uncut_ruby" },
    { id = "uncut_emerald" },
    { id = "uncut_sapphire" },
    { id = "uncut_opal" },
    { id = "uncut_jade" },
    { id = "uncut_red_topaz" },
    { id = "gold_ring" },
    { id = "sapphire_ring" },
    { id = "emerald_ring" },
    { id = "ruby_ring" },
    { id = "diamond_ring" }
]

