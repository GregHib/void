[.skeletal_wyverns]
amount = [40, 80]
weight = 5
tip = "Skeletal Wyverns are extremely dangerous and they are hard to hit with arrows as they slip right through. To stand a good chance of surviving you'll need some elemental shielding from its icy breath."

[.spiritual_creatures]
amount = [120, 185]
weight = 10
tip = "Spiritual Creatures can be found in the icy caverns near Trollheim, supporting the cause of their chosen god. Wearing equipment aligned with each of the gods can help you avoid undesired conflict."

[.steel_dragons]
amount = [40, 80]
weight = 7
tip = "Steel Dragons are dangerous metallic dragons, their steel scales are far thicker than normal steel armour."

[.suqahs]
amount = [40, 80]
weight = 5
tip = "Suqahs can only be found on the mystical Lunar Isle. They are capable of melee and magic attacks and often drop hide, teeth and herbs!"

[.waterfiends]
amount = [130, 200]
weight = 10
tip = "Waterfiends are creatures of water, which live under the Baxtorian Lake. Their watery form is well defended against slashing and piercing weapons, so use something blunt."

