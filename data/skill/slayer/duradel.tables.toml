[duradel_slayer_tasks]
amount = "range"
weight = "int"
tip = "string"

[.aberrant_spectre]
amount = [130, 200]
weight = 10
tip = "Aberrant spectres are fetid, vile ghosts. The very smell of them will paralyse and harm you. A nosepeg will help ignore their stink and weak slayers might decide to pray when fighting them. They can be found in the Slayer Tower near Canifis and I have heard rumours that they also live beneath Pollnivneach in the desert."

[.abyssal_demon]
amount = [130, 200]
weight = 15
tip = "Abyssal demons are nasty creatures to deal with. They aren't really part of this realm and are able to move very quickly to trap their prey. The Slayer Tower is home to a number of these creatures."

[.aquanites]
amount = [130, 200]
weight = 9
tip = "Aquanites are amphibious creatures that attract prey using the glowing lures on their heads. They attack stronger opponents from a distance with water magic, and dislike those who pray against it. They dwell in the Fremennik Slayer Dungeon, in a chamber past the kurasks."

[.aviansies]
amount = [100, 125]
weight = 8
tip = "Aviansies can be found in the Godwars Dungeon north of Trollheim. As they are flying, you'll find melee attacks are not going to cut it."

[.bloodvelds]
amount = [130, 200]
weight = 10
tip = "Bloodveld are strange, demonic creatures. They use their long, rasping tongue to feed on just about anything they can find. Remember that their tongues are magical in nature but, moreso, they deserve to die."

[.black_demons]
amount = [130, 200]
weight = 10
tip = "Black demons are weak to ranged attacks. They're still the strongest demon and very dangerous, however. Seek them out in the Edgeville or Brimhaven dungeons."

[.black_dragons]
amount = [40, 80]
weight = 9
tip = "Black dragons are among the strongest dragons and are very fierce. Watch out for their fiery breath. I am sure you will have seen them in your travels and have honed your techniques on lesser dragons."

[.dark_beasts]
amount = [130, 200]
weight = 15
tip = "Dark beasts are large, dog-like predators with massively muscled bodies that protect them from crushing weapons. You'll find them near the Temple of Light, attracted to the power of the Death Altar."

[.desert_strykewyrm]
amount = [90, 140]
weight = 11
tip = "Head east of Al Kharid to find them on the hills above the Shantay Pass. Watch out for their vicious ranged attacks."

[.dust_devils]
amount = [130, 200]
weight = 10
tip = "Dust devils use clouds of dust, sand, ash and whatever else they can inhale to blind and disorientate their victims. Good luck on obtaining a dragon chainmail from their dusty remains."

[.dagannoth]
amount = [130, 200]
weight = 10
tip = "Dagannoth are large, sea-dwelling creatures that are very aggressive. You'll often find them in caves near sea water. There is no joy so great as to cleanse these from the face of Gielinor."

[.fire_giant]
amount = [130, 200]
weight = 10
tip = "Like other giants, Fire giants often wield large weapons. Learn to recognise what kind of weapon it is and act accordingly. Remember the days when these were a challenge to you, and laugh."

[.gargoyles]
amount = [130, 200]
weight = 10
tip = "Gargoyles are winged creatures of stone. You'll need to fight them until they are close to death before breaking them apart with a rock hammer. Exterminate those in the Slayer Tower."

[.gorak]
amount = [40, 80]
weight = 5
tip = "Goraks are extremely aggressive creatures. They have been imprisoned on an alternate plane, which is only accessible by using the fairy rings. Be extremely careful: their touch drains life points as well as skills!"

[.greater_demons]
amount = [130, 200]
weight = 10
tip = "Greater demons are weak to ranged attacks. Though not the strongest of the demons, they are still dangerous. Slaughter them easily in Brimhaven's depths, and revel in your power."

[.hellhounds]
amount = [130, 200]
weight = 9
tip = "Hellhounds are a cross between dogs and demons; they are also dangerous with a fierce bite. Make them know fear."

[.ice_strykewyrm]
amount = [100, 200]
weight = 8
# TODO req fire cape or unlock
tip = "The strongest and coldest of their kind, they are found beneath the Fremennik mountains. Be careful of all their attacks; but, as they are beings of ice, I've found my fire spells inflict far more damage against them."

[.iron_dragons]
amount = [40, 80]
weight = 9
tip = "Iron dragons are some of the weaker metallic dragons; their iron scales are far thicker than normal iron armour. Their fiery breath and sharp claws can be negated by a number of means. If you haven't visited Brimhaven Dungeon's depths then I advise you do - if only for the interesting creatures like these to kill there."

[.jungle_strykewyrm]
amount = [90, 120]
weight = 10
tip = "These tricky creatures burrow beneath the jungle north west of Oo'glog. Be careful, as these poisonous jungle wyrms like to use magical attacks from a distance, while they should be weak to stab attacks."

[.kalphites]
amount = [130, 200]
weight = 10
tip = "Kalphites are large insects that live in hives under the desert sands. I am sure that, by now, you have seen them to the south-west of Shantay Pass."

[.mithril_dragons]
amount = [4, 8]
weight = 7
tip = "Mithril dragons are very dangerous opponents. They live beneath the Baxtorian Falls and devour most of those who seek to slay them. You are a battlemaster; test your skills."

[.nechryael]
amount = [130, 200]
weight = 10
tip = "Nechryael are demons of decay that summon small winged beings to help them fight their victims. They can be found in the Slayer Tower near Canifis."

#[.scabarites]
#amount = [40, 80]
#weight = 10
#tip = "Scabarites are the followers of Scabaras and consist of anything from the lowliest dung beetle to the mightiest scarab mage. They are most commonly found near Sophanem, and under it."

[.skeletal_wyverns]
amount = [40, 80]
weight = 5
tip = "Skeletal wyverns are extremely dangerous and they are hard to hit with arrows, as they slip right through. To stand a good chance of surviving, you'll need some elemental shielding from their icy breath."

[.spiritual_creatures]
amount = [120, 185]
weight = 10
tip = "Spiritual mages are the strongest of the spiritual guardians. They are devastating against warriors, but a smart ranger can sometimes defeat them. Of course, Prayer might serve you well, too. They can be found in the icy caverns near Trollheim, supporting the cause of their chosen god."

[.steel_dragons]
amount = [40, 80]
weight = 7
tip = "Steel dragons are dangerous and metallic, with steel scales that are far thicker than normal steel armour. As you are an accomplished slayer, I am sure you'll be able to deal with them easily."

[.suqahs]
amount = [40, 80]
weight = 5
tip = "Suqahs can only be found on the mystical Lunar Isle. They use melee and magical attacks, and they often drop hide, teeth and herbs."

[.waterfiends]
amount = [130, 200]
weight = 10
tip = "Waterfiends are creatures of water that live under the Baxtorian Lake. Those followed by familiars are keen to slay these elemental forces."

#[.warped_creatures]
#amount = [130, 200]
#weight = 9
#tip = "Warped terrorbirds are creatures tainted by magical waste and are vulnerable to an elven chime and may only be damaged when a chime has been used; look carefully to work out which. Their sonic attack is a Ranged attack but may be affected by ear defences."
